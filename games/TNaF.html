<!doctype html>
<html lang="en">

    <link rel="stylesheet" href="TNaF.css" />

  <body>
    <header>

    <div class="container" >
      <img id="FlyinaPotato" src="assets/FlyinaPotatoe.png" alt="flyingPotato">
    </div>
      <div class="container" id="animatronics">
        <p class="animaP" id="FrP">Freddy: </p>
        <p class="animaP" id="ChP">Chica: </p>
