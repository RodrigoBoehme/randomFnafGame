<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNaF Version 2.0</title>
    <link rel="stylesheet" href="TNaFv2.css">
    <link rel="shortcut icon" href="assets/fweddy.ico" type="image/x-icon">

</head>

<body>
    <div id="warn">
        <h1>This game contains nothing much</h1>
        <br>
        <p>Objectives:</p>
        <ol>
            <li>Close the door</li>
            <li>Check power</li>
            <li>Check animatronics via cams(?)</li>
            <li>Change fuses </li>
            <li>Survive until 6AM</li>
        </ol>
                
        <p style="text-align: right;">Version: 0.1.1</p>
    </div>

    <button class="floating" id="Starter" onclick="Start()">Start</button>
    <div id="doorControls" class="floating" hidden>
    <button id="btnDoor" onclick="btnDoor()">Door</button>
    <button id="fuseBtn" onclick="btnFuse()">Fuse</button>
    </div>
    <button class="floating" id="btnNose" onclick="btnNose()"hidden></button>

    <main id="main" hidden>
        <div id="animatronics" class="container" >
            <div id="camAndDoor">
                <p class="p2" style="text-align: left;color: black;padding-bottom: 0;" id="time">12AB</p>
                <p class="p2" style="text-align: right; margin: 0; padding-bottom: 0;">Door<span id="fuseState">⚫</span> </p>
            </div>  
            <p style="color: brown;"><span class="attak" id="fa">⚫</span>Freddy: <Span  class="animaP" id="FrP"></Span></p>
            <p style="color: rgb(161, 161, 0);"><span class="attak" id="ca">⚫</span>Chica: <span class="animaP" id="ChP"></span></p>
            <p style="color: #703BE7;"><span class="attak" id="ba">⚫</span>Bonnie: <span class="animaP" id="BnP"></span> </p>
            <p style="color: red;"><span class="attak" id="fa2">⚫</span>Foxy: <span class="animaP" id="FxP"></span></p>

            <div id="camera">
            <p id="powerDisplay">Power: <span id="power">100</span>%</p>
            <button id="btnCam" onclick="checkAnima()">Cam</button>
            </div>
        </div>
        <script defer src="TNaFv2.js"></script>
    </main>
    
    
</body>

</html>
